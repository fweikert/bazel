---
check_docs: docs
tasks:
  rockylinux8:
    shell_commands:
      - rm -rf $HOME/bazeltest
      - mkdir $HOME/bazeltest
      - if [ -n "${UPDATE_BAZEL_LOCK_FILE:-}" ]; then bazel mod deps --lockfile_mode=update; fi
    build_flags:
      - "--config=ci-linux"
    build_targets:
      - "//scripts/packages/debian:bazel-debian.deb"
